# Globally exclude the Sony CR SDK
exclude: '^Sony_Camera_Remote/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.9
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

# Lint: Dockerfile
  - repo: https://github.com/hadolint/hadolint.git
    rev: v2.12.0
    hooks:
     -  id: hadolint-docker
        entry: hadolint/hadolint:v2.12.0 hadolint
        args:
            [
            "--failure-threshold=warning",  # Only fail on errors
            "--ignore=DL3008",  # Ignore "Pin versions in apt-get"
            "--ignore=DL3013",  # Ignore "Pin versions in pip"
            ]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: 'v22.1.1'
    hooks:
    -   id: clang-format
        types_or: [c++, c]
        args: ["-style=file", "-i"]

